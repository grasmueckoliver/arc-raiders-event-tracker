spring.application.name=arc-raiders-event-tracker

# Development-friendly embedded H2 datasource fallback when no external DB configured
spring.datasource.url=jdbc:h2:mem:arcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=postgres
spring.datasource.password=admin

# Let Hibernate create/update schema for development (don't use in production)
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
