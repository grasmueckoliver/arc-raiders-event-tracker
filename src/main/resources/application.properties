spring.application.name=arc-raiders-event-tracker

# Postgres profile
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:arcdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# JPA settings
# TODO: Change to validate in production or use Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update

# Actuator settings
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Hikari settings
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1

# Toggle caching (default: enabled)
metaforge.cache.enabled=true